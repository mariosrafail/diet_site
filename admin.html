<!DOCTYPE html>
<html lang="el">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin - Βάση Τροφίμων</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="bg-orb orb-1"></div>
  <div class="bg-orb orb-2"></div>

  <main class="layout">
    <section class="panel glass food-db-panel">
      <div class="section-head">
        <h2>Admin Βάση Τροφίμων</h2>
        <p>Μόνο εδώ προσθέτεις/ενημερώνεις τρόφιμα, macros και εικόνα.</p>
      </div>
      <div class="food-db-grid">
        <div class="food-db-table-wrap">
          <table class="food-db-table">
            <thead>
              <tr>
                <th>Τρόφιμο</th>
                <th>Κατηγορία</th>
                <th>Μονάδα</th>
                <th>kcal</th>
                <th>P</th>
                <th>C</th>
                <th>F</th>
                <th>Εικόνα</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody id="foodDbTable"></tbody>
          </table>
        </div>

        <div class="food-db-form">
          <h3>Προσθήκη / Ενημέρωση</h3>
          <label><span>Όνομα</span><input id="dbNameInput" type="text" placeholder="π.χ. Γιαούρτι 2%" /></label>
          <label>
            <span>Κατηγορία</span>
            <select id="dbCategoryInput">
              <option value="vegetables">Λαχανικά</option>
              <option value="fruit">Φρούτα (υδατάνθρακας)</option>
              <option value="protein" selected>Πηγή πρωτεΐνης</option>
              <option value="carb">Πηγή υδατάνθρακα</option>
              <option value="fat">Πηγή λιπαρών</option>
            </select>
          </label>
          <div class="food-db-form-grid">
            <label><span>Μονάδα</span><select id="dbUnitInput"><option value="g">g</option><option value="ml">ml</option><option value="τεμ">τεμ</option></select></label>
            <label><span>kcal</span><input id="dbCalInput" type="number" min="0" step="0.1" value="100" /></label>
            <label><span>P</span><input id="dbProteinInput" type="number" min="0" step="0.1" value="10" /></label>
            <label><span>C</span><input id="dbCarbsInput" type="number" min="0" step="0.1" value="5" /></label>
            <label><span>F</span><input id="dbFatInput" type="number" min="0" step="0.1" value="3" /></label>
          </div>
          <label>
            <span>Εικόνα</span>
            <select id="dbImageInput"></select>
          </label>
          <div id="imagePreviewWrap" class="food-label-wrap">
            <img id="imagePreview" class="food-thumb" alt="Preview" />
            <small id="imagePreviewText"></small>
          </div>
          <button class="btn btn-secondary" id="saveFoodDbBtn" type="button">Αποθήκευση τροφίμου</button>
        </div>
      </div>
    </section>
  </main>

  <script src="admin.js"></script>
</body>
</html>
